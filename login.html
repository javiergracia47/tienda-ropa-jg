<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Wild Yukon</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <header>
        <img src="imagenes/Captura de pantalla 2026-03-28 204415.png" alt="Logo Wild Yukon" />
        <h1 class="nombre-empresa">Wild Yukon</h1>
        <nav>
            <ul>
                <li><a href="index.html">VOLVER</a></li>
                <li><a href="galeria.html">GALERIA</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <article class="imagen-principal">
            <img src="imagenes/f9d70c66-4ee3-43b0-b8ae-3499593c4069.jpg" alt="Wild Yukon" />
        </article>

        <article class="login-form">

            <h1>INICIAR SESIÓN</h1>

            <form>

                <p>
                    <label>Email</label>
                    <input class="controles" type="email" placeholder="Ingrese su email" />
                </p>

                <p>
                    <label>Password</label>
                    <input class="controles" type="password" placeholder="Ingrese su contraseña" />
                </p>

                <p>
                    <input class="botones" type="submit" value="Login" />
                </p>

            </form>

        </article>


    </main>

    <footer>
        DESARROLLADOR(A) : <span>Javier Gracia</span>
    </footer>
